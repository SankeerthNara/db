name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          registry-url: https://npm.pkg.github.com
          scope: '@in3pire'

      - run: npm ci

      - run: npm run build

      - run: npm test
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
